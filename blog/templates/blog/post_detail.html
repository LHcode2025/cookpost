{% extends "blog/base.html" %}

{% block content %}
<div class="content-sections">
    <h1>{{ post.title }}</h1>
    <p>{{ post.content }}</p>
    <hr>
    <small>{{ post.pub_date }}</small>
    <div class="btn-group">
        <a href="{% url 'post-update' post.pk %}">edit</a>
        <a href="{% url 'post-delete' post.pk %}">delete</a>
        <a href="{% url 'home' %}">return home</a>
    </div>
</div>
{% endblock %}
